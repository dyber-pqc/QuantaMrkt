name: PQC Sign Models

on:
  schedule:
    - cron: '30 */6 * * *'   # Every 6 hours at :30
  workflow_dispatch:           # Manual trigger

jobs:
  sign:
    name: Sign models with ML-DSA-87
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install liboqs (C library)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs
          mkdir build && cd build
          cmake -GNinja -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install Python dependencies
        run: |
          pip install liboqs-python httpx
          cd lib && pip install -e .

      - name: Generate or load ML-DSA-87 keypair
        id: keygen
        env:
          PLATFORM_ML_DSA_PRIVATE_KEY: ${{ secrets.PLATFORM_ML_DSA_PRIVATE_KEY }}
          PLATFORM_ML_DSA_PUBLIC_KEY: ${{ secrets.PLATFORM_ML_DSA_PUBLIC_KEY }}
        run: |
          python -c "
          import os, oqs
          pk_hex = os.environ.get('PLATFORM_ML_DSA_PUBLIC_KEY', '')
          sk_hex = os.environ.get('PLATFORM_ML_DSA_PRIVATE_KEY', '')
          if pk_hex and sk_hex and len(pk_hex) > 100 and len(sk_hex) > 100:
              try:
                  bytes.fromhex(pk_hex)
                  bytes.fromhex(sk_hex)
                  print('Keys loaded from secrets - ready to sign')
              except ValueError:
                  print('ERROR: Invalid key hex in secrets')
          else:
              print('No valid keys found. Generating new ML-DSA-87 keypair...')
              signer = oqs.Signature('Dilithium5')
              pk = signer.generate_keypair()
              sk = signer.export_secret_key()
              print()
              print('=' * 80)
              print('NEW ML-DSA-87 PLATFORM KEYPAIR GENERATED')
              print('=' * 80)
              print()
              print('STEP 1: Go to https://github.com/dyber-pqc/QuantaMrkt/settings/secrets/actions')
              print()
              print('STEP 2: Update PLATFORM_ML_DSA_PUBLIC_KEY with this value:')
              print(pk.hex())
              print()
              print('STEP 3: Update PLATFORM_ML_DSA_PRIVATE_KEY with this value:')
              print(sk.hex())
              print()
              print(f'Public key: {len(pk)} bytes, Private key: {len(sk)} bytes')
              print('=' * 80)
              print()
              print('After saving both secrets, re-run this workflow to sign all models.')
          "

      - name: Sign all models
        env:
          QUANTAMRKT_API_URL: https://quantamrkt.com
          QUANTAMRKT_API_TOKEN: ${{ secrets.QUANTAMRKT_API_TOKEN }}
          PLATFORM_ML_DSA_PRIVATE_KEY: ${{ secrets.PLATFORM_ML_DSA_PRIVATE_KEY }}
          PLATFORM_ML_DSA_PUBLIC_KEY: ${{ secrets.PLATFORM_ML_DSA_PUBLIC_KEY }}
        run: |
          python -m quantumshield.signing_service --sign-all
