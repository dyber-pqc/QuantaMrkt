name: PQC Sign Models

on:
  schedule:
    - cron: '30 */6 * * *'   # Every 6 hours at :30
  workflow_dispatch:           # Manual trigger

jobs:
  sign:
    name: Sign models with ML-DSA-87
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install liboqs C library (pinned to 0.14.0 to match Python bindings 0.14.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --branch 0.14.0 --depth 1 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs
          mkdir build && cd build
          cmake -GNinja -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install Python dependencies
        run: |
          pip install liboqs-python==0.14.1 httpx
          cd lib && pip install -e .

      - name: Generate or load ML-DSA-87 keypair
        id: keygen
        env:
          PLATFORM_ML_DSA_PRIVATE_KEY: ${{ secrets.PLATFORM_ML_DSA_PRIVATE_KEY }}
          PLATFORM_ML_DSA_PUBLIC_KEY: ${{ secrets.PLATFORM_ML_DSA_PUBLIC_KEY }}
          GH_TOKEN: ${{ secrets.QUANTAMRKT_API_TOKEN }}
        run: |
          python -c "
          import os, oqs, subprocess, json

          pk_hex = os.environ.get('PLATFORM_ML_DSA_PUBLIC_KEY', '')
          sk_hex = os.environ.get('PLATFORM_ML_DSA_PRIVATE_KEY', '')

          need_new_key = True
          if pk_hex and sk_hex and len(pk_hex) > 100 and len(sk_hex) > 100:
              try:
                  pk = bytes.fromhex(pk_hex)
                  sk = bytes.fromhex(sk_hex)
                  # Test that the key actually works with this liboqs version
                  avail = oqs.get_enabled_sig_mechanisms()
                  alg = 'Dilithium5' if 'Dilithium5' in avail else 'ML-DSA-87'
                  signer = oqs.Signature(alg, sk)
                  msg = b'test message for key validation'
                  sig = signer.sign(msg)
                  verifier = oqs.Signature(alg)
                  if verifier.verify(msg, sig, pk):
                      print(f'Keys loaded and verified with {alg} - ready to sign')
                      need_new_key = False
                  else:
                      print('Key self-verification failed - generating new keypair')
              except Exception as e:
                  print(f'Key load failed ({e}) - generating new keypair')

          if need_new_key:
              print('Generating new ML-DSA-87 keypair...')
              avail = oqs.get_enabled_sig_mechanisms()
              alg = 'ML-DSA-87' if 'ML-DSA-87' in avail else 'Dilithium5'
              print(f'Using algorithm: {alg}')
              signer = oqs.Signature(alg)
              pk = signer.generate_keypair()
              sk = signer.export_secret_key()

              pk_hex = pk.hex()
              sk_hex = sk.hex()

              # Mask private key so it never appears in logs
              print(f'::add-mask::{sk_hex}')

              # Auto-save to GitHub secrets
              repo = 'dyber-pqc/QuantaMrkt'
              print('Saving keys to GitHub secrets...')
              subprocess.run(['gh', 'secret', 'set', 'PLATFORM_ML_DSA_PUBLIC_KEY', '--repo', repo, '--body', pk_hex], check=True)
              subprocess.run(['gh', 'secret', 'set', 'PLATFORM_ML_DSA_PRIVATE_KEY', '--repo', repo, '--body', sk_hex], check=True)

              # Also write to env so this same run can use them
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'PLATFORM_ML_DSA_PUBLIC_KEY={pk_hex}\n')
                  f.write(f'PLATFORM_ML_DSA_PRIVATE_KEY={sk_hex}\n')

              print(f'Done. Public key ({len(pk)} bytes): {pk_hex[:60]}...')
              print('Keys saved to secrets and exported for signing step.')
          "

      - name: Sign all models
        env:
          QUANTAMRKT_API_URL: https://quantamrkt.com
          QUANTAMRKT_API_TOKEN: ${{ secrets.QUANTAMRKT_API_TOKEN }}
          PLATFORM_ML_DSA_PRIVATE_KEY: ${{ secrets.PLATFORM_ML_DSA_PRIVATE_KEY }}
          PLATFORM_ML_DSA_PUBLIC_KEY: ${{ secrets.PLATFORM_ML_DSA_PUBLIC_KEY }}
        run: |
          python -m quantumshield.signing_service --sign-all
