name: PQC Sign Models

# Scheduled runs are owned by GitLab CI (.gitlab-ci.yml).
# This workflow stays available as a manual fallback / debug trigger.
on:
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regeneration of platform keypair'
        required: false
        default: 'false'

jobs:
  sign:
    name: Sign models with ML-DSA-87
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install liboqs C library (pinned to 0.14.0 to match Python bindings 0.14.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev
          git clone --branch 0.14.0 --depth 1 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs
          mkdir build && cd build
          cmake -GNinja -DBUILD_SHARED_LIBS=ON ..
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install Python dependencies
        run: |
          pip install liboqs-python==0.14.1 httpx
          cd lib && pip install -e .

      - name: Load or provision ML-DSA-87 keypair
        env:
          BOOTSTRAP_PUBLIC_KEY: ${{ secrets.PLATFORM_ML_DSA_PUBLIC_KEY }}
          BOOTSTRAP_PRIVATE_KEY: ${{ secrets.PLATFORM_ML_DSA_PRIVATE_KEY }}
          QUANTAMRKT_API_URL: https://quantamrkt.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate }}
        run: python scripts/pqc_sign_setup.py

      - name: Sign all models
        env:
          QUANTAMRKT_API_URL: https://quantamrkt.com
          QUANTAMRKT_API_TOKEN: ${{ secrets.QUANTAMRKT_API_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python -m quantumshield.signing_service --sign-all
