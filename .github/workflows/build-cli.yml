name: Build CLI Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: quantumshield-linux-x86_64
            pyinstaller_args: --onefile --name quantumshield-linux-x86_64
          - os: macos-latest
            artifact_name: quantumshield-macos-x86_64
            pyinstaller_args: --onefile --name quantumshield-macos-x86_64
          - os: windows-latest
            artifact_name: quantumshield-windows-x86_64.exe
            pyinstaller_args: --onefile --name quantumshield-windows-x86_64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: lib
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build with PyInstaller
        working-directory: lib
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} --hidden-import quantumshield --collect-submodules quantumshield src/quantumshield/cli/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: lib/dist/${{ matrix.artifact_name }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
