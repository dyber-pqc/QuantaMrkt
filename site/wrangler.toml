name = "quantmrkt"
main = "./dist/_worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "quantamrkt.com"
custom_domain = true

[[routes]]
pattern = "www.quantamrkt.com"
custom_domain = true

[assets]
directory = "./dist"

[vars]
PUBLIC_SITE_URL = "https://quantamrkt.com"
GITHUB_CLIENT_ID = "Ov23liuaDLn9Xtgh2uCO"
# ML-DSA-87 platform public key (safe to commit — this is PUBLIC).
# Set to the real value after the first GitHub Actions signing run.
PLATFORM_ML_DSA_PUBLIC_KEY = "NOT_YET_CONFIGURED"

[[d1_databases]]
binding = "DB"
database_name = "quantmrkt-db"
database_id = "d4d02fc6-3c5c-49f6-a756-ff8480adbcdb"

[[r2_buckets]]
binding = "MANIFESTS"
bucket_name = "quantmrkt-manifests"

[triggers]
crons = ["0 * * * *"]

# Secrets (set via `wrangler secret put`):
# GITHUB_CLIENT_SECRET
# SESSION_SECRET
# Auto-deploy trigger
